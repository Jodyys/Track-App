apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: jodyys/bookapp-frontend:v13

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        env:
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: bookapp-config
              key: API_URL