global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['10.0.1.46:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['10.0.1.46:9100']
        labels:
          instance: jenkins-server
      - targets: ['10.0.1.179:9100']
        labels:
          instance: k3s-master-server
      - targets: ['10.0.1.110:9100']
        labels:
          instance: k3s-worker-node-1

  - job_name: 'kube-state-metrics'
    static_configs:
    - targets:
        - '10.0.1.110:31844'

  #- job_name: 'cadvisor'
    #static_configs:
      #- targets: ['10.0.1.46:8081']
      #- targets: ['10.0.1.179:8081']